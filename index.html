  <body class="christmas-theme">
    <div id="load-header"></div>

    <main>
      <div id="load-inicio"></div>
      <div id="load-identidad"></div>
      <div id="load-padecimientos"></div>
      <div id="load-metodo"></div>
      <div id="load-instalaciones"></div>
      <div id="load-equipo"></div>
      <div id="load-testimonios"></div>
      <div id="load-podcast"></div>
      <div id="load-contacto"></div>
      <div id="load-donacion"></div>
    </main>

    <div id="load-footer"></div>

    <script>
      document.addEventListener("DOMContentLoaded", async () => {
        // [CORREGIDO] RUTAS APUNTAN A src/components/
        const includes = [
          { id: "load-header", file: "src/components/part-header.html" },
          { id: "load-inicio", file: "src/components/seccion-inicio.html" },
          {
            id: "load-identidad",
            file: "src/components/seccion-identidad.html",
          },
          {
            id: "load-padecimientos",
            file: "src/components/seccion-padecimientos.html",
          },
          { id: "load-metodo", file: "src/components/seccion-metodo.html" },
          {
            id: "load-instalaciones",
            file: "src/components/seccion-instalaciones.html",
          },
          { id: "load-equipo", file: "src/components/seccion-equipo.html" },
          {
            id: "load-testimonios",
            file: "src/components/seccion-testimonios.html",
          },
          { id: "load-podcast", file: "src/components/podcast.html" },
          { id: "load-contacto", file: "src/components/seccion-contacto.html" },
          { id: "load-donacion", file: "src/components/seccion-donacion.html" },
          { id: "load-footer", file: "src/components/part-footer.html" },
        ];

        // Función asíncrona para cargar HTML
        const loadSection = async (item) => {
          try {
            const response = await fetch(item.file);
            if (!response.ok) throw new Error(`Error loading ${item.file}`);
            const text = await response.text();

            // [OPCIONAL PERO RECOMENDADO] Inyección de rutas de assets
            // Si el script de PowerShell anterior no cubrió algún caso, esto lo asegura en tiempo real
            // const fixedText = text.replace(/assets\/img/g, 'src/assets/img')
            //                       .replace(/assets\/video/g, 'src/assets/video');

            document.getElementById(item.id).outerHTML = text;
          } catch (error) {
            console.error(error);
          }
        };

        // Cargar todos en paralelo
        await Promise.all(includes.map(loadSection));

        // [CORREGIDO] Cargar script principal desde src/scripts/
        const mainScript = document.createElement("script");
        mainScript.src = "src/scripts/script.js?v=3.3";
        document.body.appendChild(mainScript);
      });
    </script>
