<section class="visitor-stats" aria-label="Actividad informativa del sitio">
    <div class="container">
        <div class="visitor-stats__panel is-loading" data-visitor-stats>
            <div class="visitor-stats__item">
                <span class="visitor-stats__live-dot" aria-hidden="true"></span>
                <strong class="visitor-stats__value" data-online-count>—</strong>
                <span class="visitor-stats__label">en línea ahora</span>
            </div>

            <span class="visitor-stats__divider" aria-hidden="true"></span>

            <div class="visitor-stats__item">
                <i class="far fa-eye visitor-stats__icon" aria-hidden="true"></i>
                <strong class="visitor-stats__value" data-total-visits>—</strong>
                <span class="visitor-stats__label">visitas desde <time datetime="2026-07-16">16 jul 2026</time></span>
            </div>

            <span class="sr-only" data-visitor-stats-status aria-live="polite">Conectando con el contador.</span>
        </div>
    </div>
</section>
